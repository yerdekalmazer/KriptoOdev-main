<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kripto Uygulaması</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 750px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    }

    h1 {
      text-align: center;
      color: #e0e0e0;
      font-size: 2rem;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .altyazi {
      text-align: center;
      color: #7986cb;
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    .bolum-baslik {
      color: #90caf9;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .form-grup {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #b0bec5;
      font-size: 0.85rem;
      margin-bottom: 6px;
    }

    textarea, input[type="text"], input[type="email"], select {
      width: 100%;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 0.95rem;
      padding: 12px 16px;
      transition: border-color 0.3s, background 0.3s;
      outline: none;
    }

    textarea { resize: vertical; min-height: 90px; }

    textarea:focus, input:focus, select:focus {
      border-color: #7986cb;
      background: rgba(255, 255, 255, 0.1);
    }

    select option { background: #1a1a2e; color: #e0e0e0; }

    .satir {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .buton-grup {
      display: flex;
      gap: 12px;
      margin-top: 4px;
    }

    button {
      flex: 1;
      padding: 13px 20px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .btn-sifrele {
      background: linear-gradient(135deg, #5c6bc0, #7986cb);
      color: white;
    }
    .btn-sifrele:hover { background: linear-gradient(135deg, #3949ab, #5c6bc0); transform: translateY(-1px); }

    .btn-coz {
      background: linear-gradient(135deg, #2e7d32, #43a047);
      color: white;
    }
    .btn-coz:hover { background: linear-gradient(135deg, #1b5e20, #2e7d32); transform: translateY(-1px); }

    .btn-eposta {
      background: linear-gradient(135deg, #e64a19, #ff5722);
      color: white;
    }
    .btn-eposta:hover { background: linear-gradient(135deg, #bf360c, #e64a19); transform: translateY(-1px); }

    .sonuc-kutu {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 16px;
      min-height: 80px;
      color: #a5d6a7;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      word-break: break-all;
      white-space: pre-wrap;
      position: relative;
    }

    .kopyala-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 6px;
      color: #b0bec5;
      font-size: 0.7rem;
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.2s;
      flex: unset;
      letter-spacing: 0;
      font-weight: 600;
    }
    .kopyala-btn:hover { background: rgba(255,255,255,0.2); }

    .sonuc-sarici { position: relative; }

    .ayrac {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin: 32px 0;
    }

    .uyari {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
    }
    .uyari-basari { background: rgba(46, 125, 50, 0.3); border: 1px solid #43a047; color: #a5d6a7; }
    .uyari-hata { background: rgba(183, 28, 28, 0.3); border: 1px solid #e53935; color: #ef9a9a; }

    .ipucu {
      font-size: 0.75rem;
      color: #607d8b;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>KriptoÖdev</h1>
    <p class="altyazi">Türkçe Alfabe Şifreleme Uygulaması</p>

    <div class="form-grup">
      <p class="bolum-baslik">Şifrelenecek / Çözülecek Metin</p>
      <textarea id="txtGiris" placeholder="Metninizi buraya yazın..."></textarea>
    </div>

    <div class="satir">
      <div class="form-grup">
        <label for="cmbYontem">Şifreleme Yöntemi</label>
        <select id="cmbYontem" onchange="anahtarIpucuGuncelle()">
          <option value="">-- Yöntem Seçin --</option>
          <option>Kaydırmalı şifreleme</option>
          <option>Doğrusal şifreleme</option>
          <option>Yer değiştirme şifreleme</option>
          <option>Sayı anahtarlı şifreleme</option>
          <option>Permütasyon şifreleme</option>
          <option>Rota şifreleme</option>
          <option>Zigzag şifreleme</option>
          <option>Vigenère şifreleme</option>
          <option>Hill şifreleme (2x2)</option>
          <option>Dört Kare şifreleme</option>
        </select>
      </div>
      <div class="form-grup">
        <label for="txtAnahtar">Anahtar</label>
        <input type="text" id="txtAnahtar" placeholder="Anahtar girin..." />
        <p class="ipucu" id="anahtarIpucu"></p>
      </div>
    </div>

    <div class="buton-grup">
      <button class="btn-sifrele" onclick="islemYap(true)">ŞİFRELE</button>
      <button class="btn-coz" onclick="islemYap(false)">ÇÖZ</button>
    </div>

    <div class="form-grup" style="margin-top: 24px;">
      <p class="bolum-baslik">Sonuç</p>
      <div class="sonuc-sarici">
        <div class="sonuc-kutu" id="sonucKutu">Sonuç burada görünecek...</div>
        <button class="kopyala-btn" onclick="kopyala()">Kopyala</button>
      </div>
    </div>

    <hr class="ayrac" />

    <p class="bolum-baslik">E-posta ile Gönder</p>

    <div class="form-grup" style="margin-top:12px;">
      <label for="txtAliciEmail">Alıcı E-posta Adresi</label>
      <input type="email" id="txtAliciEmail" placeholder="alici@ornek.com" />
    </div>

    <button class="btn-eposta" onclick="epostaGonder()" style="width:100%; margin-top:4px;">
      ŞİFRELİ METNİ E-POSTA İLE GÖNDER
    </button>

    <div class="uyari uyari-basari" id="epostaBasari">E-posta başarıyla gönderildi!</div>
    <div class="uyari uyari-hata" id="epostaHata"></div>
  </div>

  <script>
    const ipuclari = {
      'Kaydırmalı şifreleme': 'Sayısal anahtar girin (örn: 3)',
      'Doğrusal şifreleme': 'Sayısal anahtar girin (örn: 5)',
      'Sayı anahtarlı şifreleme': 'Sütun sayısını girin (örn: 4)',
      'Vigenère şifreleme': 'Metin anahtar girin (örn: ANAHTAR)',
      'Hill şifreleme (2x2)': '4 sayı girin boşlukla (örn: 2 3 5 7)',
      'Dört Kare şifreleme': 'İki anahtar girin virgülle (örn: ANAHTAR1,ANAHTAR2)',
      'Yer değiştirme şifreleme': 'Anahtar gerekmez',
      'Permütasyon şifreleme': 'Anahtar gerekmez',
      'Rota şifreleme': 'Anahtar gerekmez',
      'Zigzag şifreleme': 'Anahtar gerekmez',
    };

    function anahtarIpucuGuncelle() {
      const yontem = document.getElementById('cmbYontem').value;
      document.getElementById('anahtarIpucu').textContent = ipuclari[yontem] || '';
    }

    async function islemYap(sifrele) {
      const metin = document.getElementById('txtGiris').value.trim();
      const yontem = document.getElementById('cmbYontem').value;
      const anahtar = document.getElementById('txtAnahtar').value.trim();
      const sonucKutu = document.getElementById('sonucKutu');

      if (!metin) { sonucKutu.textContent = 'Lütfen metin girin.'; return; }
      if (!yontem) { sonucKutu.textContent = 'Lütfen bir şifreleme yöntemi seçin.'; return; }

      sonucKutu.textContent = 'İşleniyor...';
      try {
        const res = await fetch('/api/kripto/islem', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ metin, yontem, anahtar, sifrele })
        });
        const data = await res.json();
        if (res.ok) {
          sonucKutu.textContent = data.sonuc;
          sonucKutu.style.color = '#a5d6a7';
        } else {
          sonucKutu.textContent = 'Hata: ' + data.hata;
          sonucKutu.style.color = '#ef9a9a';
        }
      } catch {
        sonucKutu.textContent = 'Sunucuya bağlanılamadı.';
        sonucKutu.style.color = '#ef9a9a';
      }
    }

    function kopyala() {
      const metin = document.getElementById('sonucKutu').textContent;
      navigator.clipboard.writeText(metin).then(() => {
        const btn = document.querySelector('.kopyala-btn');
        btn.textContent = 'Kopyalandı!';
        setTimeout(() => btn.textContent = 'Kopyala', 1500);
      });
    }

    async function epostaGonder() {
      const sifreliMetin = document.getElementById('sonucKutu').textContent;
      const aliciEmail = document.getElementById('txtAliciEmail').value.trim();
      const anahtar = document.getElementById('txtAnahtar').value.trim();
      const yontem = document.getElementById('cmbYontem').value;
      const basari = document.getElementById('epostaBasari');
      const hata = document.getElementById('epostaHata');

      basari.style.display = 'none';
      hata.style.display = 'none';

      if (!aliciEmail) {
        hata.textContent = 'Lütfen alıcı e-posta adresini girin.';
        hata.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/kripto/email-gonder', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ aliciEmail, sifreliMetin, anahtar, yontem })
        });
        const data = await res.json();
        if (res.ok) {
          basari.style.display = 'block';
        } else {
          hata.textContent = data.hata;
          hata.style.display = 'block';
        }
      } catch {
        hata.textContent = 'Sunucuya bağlanılamadı.';
        hata.style.display = 'block';
      }
    }
  </script>
</body>
</html>
